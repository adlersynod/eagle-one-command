env OPENCLAW_GATEWAY_TOKEN;

worker_processes 1;
error_log /Volumes/Adler_Data/OpenClaw/logs/nginx-eagleone-error.log;
pid /tmp/nginx-eagleone.pid;

events {
    worker_connections 1024;
}

http {
    include /opt/homebrew/etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /Volumes/Adler_Data/OpenClaw/logs/nginx-eagleone-access.log main;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    server {
        listen 4173;
        server_name _;

        # Serve static files from dist/
        root /Volumes/Adler_Data/OpenClaw/workspace/agents/EagleOne/eagle-one-command/dist;
        index index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback - all routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy OpenAI-compatible /v1 API to OpenClaw Gateway
        location /v1 {
            proxy_pass http://127.0.0.1:18789;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Inject OpenClaw gateway token — nginx is trusted proxy on loopback
            proxy_set_header Authorization "Bearer $OPENCLAW_GATEWAY_TOKEN";

            # Streaming SSE support
            proxy_set_header Accept 'text/event-stream';
            proxy_set_header Cache-Control 'no-cache';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }

        # Proxy legacy /api to OpenClaw Gateway (fallback)
        location /api {
            proxy_pass http://127.0.0.1:18789;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept 'text/event-stream';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}
